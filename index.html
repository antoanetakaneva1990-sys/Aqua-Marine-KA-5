<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Apartment Nea Peramos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ECECE6; /* RAL 9002 */
    font-size: 18px;
    color: #333;
}

header {
    text-align: center;
    padding: 30px 15px;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.lang-buttons {
    text-align: center;
    margin-bottom: 25px;
}

button {
    padding: 10px 18px;
    margin: 5px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: #333;
    color: white;
    font-size: 16px;
}

button:hover {
    background: #555;
}

/* gallery */

.gallery {
    position: relative;
    max-width: 100%;
    margin-bottom: 30px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    display: none;
}

.gallery img.active {
    display: block;
}

.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    background: rgba(0,0,0,0.4);
    color: white;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 50%;
    user-select: none;
}

.arrow.left { left: 10px; }
.arrow.right { right: 10px; }

.section {
    margin-bottom: 30px;
}

.price-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.booking-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

input {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
}
</style>
</head>

<body>

<header>
<h1 data-bg="Луксозен апартамент – Неа Перамос"
    data-en="Luxury Apartment – Nea Peramos">
Луксозен апартамент – Неа Перамос
</h1>
</header>

<div class="container">

<div class="lang-buttons">
<button onclick="setLang('bg')">BG</button>
<button onclick="setLang('en')">EN</button>
</div>

<!-- ✅ ГАЛЕРИЯ С ТВОИТЕ СНИМКИ -->

<div class="gallery">
<div class="arrow left" onclick="prevImg()">❮</div>
<div class="arrow right" onclick="nextImg()">❯</div>

<img src="644AE9AE-8FED-4B40-A01E-920C312CFDD4.jpeg" class="active">
<img src="85E38FA5-BB99-4CB0-8DF5-F9524C0476E3.jpeg">
</div>

<!-- DESCRIPTION -->

<div class="section"
data-bg="Апартаментът се намира на стратегическа и изключително удобна локация — само на около 2 км от яхтеното пристанище на Ираклица (около 1–2 минути с автомобил), което го прави отличен избор както за почивка в Неа Перамос, така и за гости, които желаят бърз достъп до Ираклица. В същото време ще се насладите на спокойствие, простор и лесен достъп до прочутите тюркоазени води на емблематичните плажове Амолофи — едни от най-красивите в района."
data-en="The apartment is located in a strategic and highly convenient area — just about 2 km from the Iraklitsa marina (approximately 1–2 minutes by car), making it a perfect choice both for a holiday in Nea Peramos and for guests who want quick access to Iraklitsa. At the same time, you will enjoy peace, space, and easy access to the famous turquoise waters of the iconic Ammolofi beaches — among the most beautiful in the region.">
Апартаментът се намира на стратегическа и изключително удобна локация...
</div>

<!-- PRICE RULE -->

<div class="price-box">
<div data-bg="Под 5 нощувки: 160€ / нощ"
     data-en="Less than 5 nights: 160€ / night">
Под 5 нощувки: 160€ / нощ
</div>
<div data-bg="5+ нощувки: 150€ / нощ"
     data-en="5+ nights: 150€ / night">
5+ нощувки: 150€ / нощ
</div>
</div>

<!-- BOOKING -->

<div class="booking-box">
<h3 data-bg="Провери цена" data-en="Check price">Провери цена</h3>

<label data-bg="От:" data-en="From:">От:</label>
<input type="date" id="dateFrom">

<label data-bg="Нощувки:" data-en="Nights:">Нощувки:</label>
<input type="number" id="nights" min="1" value="1">

<button onclick="calcPrice()">OK</button>

<p id="result"></p>
</div>

<!-- CONTACTS -->

<div class="section">
<h2 data-bg="Контакти" data-en="Contacts">Контакти</h2>
<p>📞 +359 XXX XXX XXX</p>
<p>📧 your@email.com</p>
<p><a href="#" target="_blank">Facebook</a></p>
</div>

<div style="text-align:center;">
<button>
<span data-bg="Плати депозит 20%"
      data-en="Pay 20% deposit">
Плати депозит 20%
</span>
</button>
</div>

</div>

<script>
let current = 0;
const images = document.querySelectorAll('.gallery img');

function showImg(index) {
    images.forEach(img => img.classList.remove('active'));
    images[index].classList.add('active');
}

function nextImg() {
    current = (current + 1) % images.length;
    showImg(current);
}

function prevImg() {
    current = (current - 1 + images.length) % images.length;
    showImg(current);
}

function setLang(lang) {
    document.querySelectorAll('[data-bg]').forEach(el => {
        el.innerText = el.getAttribute('data-' + lang);
    });
}

function calcPrice() {
    const nights = Number(document.getElementById('nights').value);
    const pricePerNight = nights >= 5 ? 150 : 160;
    const total = nights * pricePerNight;
    document.getElementById('result').innerText =
        "Общо: " + total + "€";
}
</script>

</body>
</html>
