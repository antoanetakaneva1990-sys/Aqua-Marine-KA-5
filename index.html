<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sea View Apartment Nea Peramos</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #eeede6; /* RAL 9002 */
}

header {
  text-align: center;
  padding: 30px 10px;
}

h1 {
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* gallery */
.gallery {
  position: relative;
  max-width: 100%;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  background: rgba(0,0,0,0.4);
  color: white;
  padding: 8px 14px;
  cursor: pointer;
  border-radius: 6px;
}

.left { left: 10px; }
.right { right: 10px; }

/* form */
.form-box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-top: 30px;
}

input, button, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

.lang-btn {
  width: auto;
  margin: 5px;
  padding: 6px 12px;
}

footer {
  text-align: center;
  padding: 30px;
}
</style>
</head>

<body>

<header>
  <h1 id="title">Sea View Apartment</h1>
  <button class="lang-btn" onclick="setLang('bg')">BG</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</header>

<div class="container">

<!-- ✅ ГАЛЕРИЯ -->
<div class="gallery">
  <span class="arrow left" onclick="prev()">❮</span>
  <img id="galleryImg" src="img1.jpg" alt="apartment">
  <span class="arrow right" onclick="next()">❯</span>
</div>

<!-- ✅ ОПИСАНИЕ -->
<p id="desc">
Стилен и уютен апартамент, разположен на тиха улица в красивото гръцко курортно градче
</p>

<p><b id="locationLabel">Локация:</b> 
<a href="https://maps.google.com" target="_blank">
📍 <span id="locationText">Неа Перамос, Гърция</span>
</a>
</p>

<!-- ✅ ФОРМА -->
<div class="form-box">
<h2 id="bookingTitle">Направи запитване</h2>

<label id="checkinLabel">Дата на настаняване (От):</label>
<input type="date" id="checkin">

<label id="nightsLabel">Брой нощувки:</label>
<input type="number" id="nights" min="1">

<p id="priceResult"><b>Обща цена:</b></p>

<button onclick="calculatePrice()" id="calcBtn">
Изчисли цена
</button>

<button onclick="payDeposit()" id="depositBtn"
style="background:#e67e22;">
Плати депозит 20%
</button>
</div>

<!-- ✅ КОНТАКТИ -->
<h3 id="contactTitle">Контакти</h3>
<p>📞 +359 XXX XXX XXX</p>
<p>📧 your@email.com</p>

<p>
<a href="https://facebook.com" target="_blank">
👉 Facebook страница
</a>
</p>

</div>

<footer>
© 2026 Sea View Apartment
</footer>

<script>
/* gallery */
let images = ["img1.jpg","img2.jpg","img3.jpg"];
let index = 0;

function showImage(){
  document.getElementById("galleryImg").src = images[index];
}

function next(){
  index = (index + 1) % images.length;
  showImage();
}

function prev(){
  index = (index - 1 + images.length) % images.length;
  showImage();
}

/* price */
function calculatePrice(){
  let nights = document.getElementById("nights").value;
  if(!nights) return;

  let pricePerNight = nights >= 5 ? 150 : 160;
  let total = nights * pricePerNight;

  document.getElementById("priceResult").innerHTML =
    "<b>Обща цена: " + total + " € (" + pricePerNight + " €/нощ)</b>";
}

/* deposit demo */
function payDeposit(){
  alert("Тук ще свържем Stripe/PayPal за депозит 20%");
}

/* language */
function setLang(lang){
  if(lang === "en"){
    document.getElementById("title").innerText="Sea View Apartment";
    document.getElementById("desc").innerText=
      "Stylish and cozy apartment located in the beautiful resort town of Nea Peramos.";
    document.getElementById("bookingTitle").innerText="Make an inquiry";
    document.getElementById("checkinLabel").innerText="Check-in date:";
    document.getElementById("nightsLabel").innerText="Nights:";
    document.getElementById("calcBtn").innerText="Calculate price";
    document.getElementById("depositBtn").innerText="Pay 20% deposit";
    document.getElementById("contactTitle").innerText="Contacts";
    document.getElementById("locationText").innerText="Nea Peramos, Greece";
    document.getElementById("locationLabel").innerText="Location:";
  } else {
    document.getElementById("title").innerText="Sea View Apartment";
    document.getElementById("desc").innerText=
      "Стилен и уютен апартамент, разположен в красивото курортно градче Неа Перамос.";
    document.getElementById("bookingTitle").innerText="Направи запитване";
    document.getElementById("checkinLabel").innerText="Дата на настаняване (От):";
    document.getElementById("nightsLabel").innerText="Брой нощувки:";
    document.getElementById("calcBtn").innerText="Изчисли цена";
    document.getElementById("depositBtn").innerText="Плати депозит 20%";
    document.getElementById("contactTitle").innerText="Контакти";
    document.getElementById("locationText").innerText="Неа Перамос, Гърция";
    document.getElementById("locationLabel").innerText="Локация:";
  }
}
</script>

</body>
</html>
