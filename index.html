<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apartment Nea Peramos</title>

<style>
body{
    margin:0;
    background:#ECECE6; /* RAL 9002 */
    font-family: Arial, sans-serif;
    font-size:18px;
    color:#222;
}

header{
    text-align:center;
    padding:30px 15px 10px 15px;
}

h1{
    margin:0;
    font-weight:600;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.lang-buttons{
    text-align:center;
    margin:20px 0;
}

.lang-buttons button{
    padding:8px 16px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#333;
    color:#fff;
    cursor:pointer;
}

.lang-buttons button:hover{
    background:#555;
}

/* Gallery */

.gallery{
    position:relative;
    margin-bottom:30px;
}

.gallery img{
    width:100%;
    border-radius:12px;
    display:none;
}

.gallery img.active{
    display:block;
}

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:28px;
    background:rgba(0,0,0,0.4);
    color:#fff;
    padding:6px 12px;
    border-radius:50%;
    cursor:pointer;
    user-select:none;
}

.arrow.left{ left:10px; }
.arrow.right{ right:10px; }

.section{
    margin-bottom:30px;
}

.price-box, .booking-box{
    background:#fff;
    padding:20px;
    border-radius:12px;
}

input{
    padding:8px;
    margin:5px;
    font-size:16px;
}

.pay-btn{
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:8px;
    background:#333;
    color:#fff;
    cursor:pointer;
}

.pay-btn:hover{
    background:#555;
}
</style>
</head>

<body>

<header>
<h1 
data-bg="Луксозен апартамент – Неа Перамос"
data-en="Luxury Apartment – Nea Peramos">
Луксозен апартамент – Неа Перамос
</h1>
</header>

<div class="container">

<div class="lang-buttons">
<button onclick="setLang('bg')">BG</button>
<button onclick="setLang('en')">EN</button>
</div>

<!-- ГАЛЕРИЯ С ТВОИТЕ СНИМКИ -->

<div class="gallery">
<div class="arrow left" onclick="prevImg()">❮</div>
<div class="arrow right" onclick="nextImg()">❯</div>

<img src="644AE9AE-8FED-4B40-A01E-920C312CFDD4.jpeg" class="active" alt="">
<img src="85E38FA5-BB99-4CB0-8DF5-F9524C0476E3.jpeg" alt="">

</div>

<!-- ОПИСАНИЕ -->

<div class="section"
data-bg="Апартаментът се намира на около 2 км от яхтеното пристанище на Ираклица (около минута и половина с автомобил), което го прави отличен избор както за почивка в Неа Перамос, така и за гости, които желаят бърз достъп до Ираклица. В същото време сте в близост до тюркоазените води на емблематичните плажове Амолофи."
data-en="The apartment is located about 2 km from the Iraklitsa marina (around one and a half minutes by car), making it a perfect choice both for Nea Peramos holidays and for guests who want quick access to Iraklitsa. At the same time, you are close to the turquoise waters of the iconic Ammolofi beaches.">
Апартаментът се намира на около 2 км от яхтеното пристанище на Ираклица...
</div>

<!-- ЦЕНИ -->

<div class="section price-box">
<div 
data-bg="Под 5 нощувки: 160€ / нощ"
data-en="Less than 5 nights: 160€ / night">
Под 5 нощувки: 160€ / нощ
</div>
<div 
data-bg="5+ нощувки: 150€ / нощ"
data-en="5+ nights: 150€ / night">
5+ нощувки: 150€ / нощ
</div>
</div>

<!-- РЕЗЕРВАЦИЯ -->

<div class="section booking-box">
<label data-bg="От:" data-en="From:">От:</label>
<input type="date" id="dateFrom">

<label data-bg="Нощувки:" data-en="Nights:">Нощувки:</label>
<input type="number" id="nights" min="1" value="1">

<button onclick="calcPrice()">OK</button>

<p id="result"></p>
</div>

<!-- КОНТАКТИ -->

<div class="section">
<h2 data-bg="Контакти" data-en="Contacts">Контакти</h2>
<p>📞 +359 XXX XXX XXX</p>
<p>📧 your@email.com</p>
<p><a href="#" target="_blank">Facebook</a></p>
</div>

<div style="text-align:center;">
<button class="pay-btn">
<span data-bg="Плати депозит 20%"
      data-en="Pay 20% deposit">
Плати депозит 20%
</span>
</button>
</div>

</div>

<script>
let current=0;
const images=document.querySelectorAll('.gallery img');

function showImg(index){
    images.forEach(img=>img.classList.remove('active'));
    images[index].classList.add('active');
}

function nextImg(){
    current=(current+1)%images.length;
    showImg(current);
}

function prevImg(){
    current=(current-1+images.length)%images.length;
    showImg(current);
}

function setLang(lang){
    document.querySelectorAll('[data-bg]').forEach(el=>{
        el.innerText=el.getAttribute('data-'+lang);
    });
}

function calcPrice(){
    const nights=Number(document.getElementById('nights').value);
    const price=nights>=5?150:160;
    const total=nights*price;
    document.getElementById('result').innerText="Общо: "+total+"€";
}
</script>

</body>
</html>
