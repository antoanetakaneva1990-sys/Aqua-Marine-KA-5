<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Marine KA5</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  background:#D8D8D8;
  font-family:'Roboto', sans-serif;
  font-size:17px;
  color:#2b2b2b;
  line-height:1.95;
}

header{
  background:linear-gradient(135deg,#033c3c,#0f6a6a);
  color:white;
  text-align:center;
  padding:60px 20px;
  opacity:0;
  animation: fadeIn 1.2s forwards;
}

header h1{
  font-weight:700;
  font-size:3.2rem;
  margin:0 0 10px;
}

header p{
  font-size:1.2rem;
  margin:0;
}

.lang-switch{
  text-align:center;
  margin:15px 0;
}

.lang-switch button{
  margin:0 5px;
}

.container{
  max-width:1150px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:30px;
  margin:20px 0;
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  opacity:0;
  transform:translateY(30px);
  transition:all 0.8s ease-out;
}

.card.visible{
  opacity:1;
  transform:translateY(0);
}

h2{
  font-weight:700;
  font-size:1.9rem;
  color:#000;
  margin-bottom:15px;
}

button{
  background:#0f6a6a;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
  transition:transform 0.3s;
}

button:hover{ transform:scale(1.05); }

.input-field{
  margin-bottom:10px;
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #cfcfcf;
  font-size:16px;
  background:#f7f7f7;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.gallery img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:transform 0.3s;
}

.gallery img:hover{ transform:scale(1.05); }

#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
  margin-bottom:15px;
}

#lightbox-controls{
  display:flex;
  justify-content:center;
  gap:15px;
}

#lightbox-controls button{
  background:#0f6a6a;
  color:white;
  border:none;
  padding:12px;
  font-size:18px;
  border-radius:50%;
  cursor:pointer;
  width:50px;
  height:50px;
  display:flex;
  justify-content:center;
  align-items:center;
}

#lightbox-controls button:hover{ transform:scale(1.05); }

.map-container{
  width:100%;
  height:400px;
  border-radius:14px;
  overflow:hidden;
}

@keyframes fadeIn{ to{opacity:1;} }

@media (max-width:768px){
  header h1{ font-size:2.5rem; }
  header p{ font-size:1rem; }
  .gallery img{ height:140px; }
  .card{ padding:20px; }
  h2{ font-size:1.7rem; }
}

@media (max-width:480px){
  header h1{ font-size:2rem; }
  header p{ font-size:0.95rem; }
  .gallery img{ height:120px; }
  h2{ font-size:1.5rem; }
}
</style>
</head>

<body>

<header>
<h1>Aqua Marine KA5</h1>
<p id="subtitle"></p>
</header>

<div class="lang-switch">
<button onclick="setLang('bg')">Български</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="container">

<div class="card">
<h2 id="aboutTitle"></h2>
<p id="aboutText"></p>
</div>

<!-- Галерията сега преди ЦЕНИ -->
<div class="card">
<h2 id="galleryTitle"></h2>
<div class="gallery" id="gallery"></div>
</div>

<div class="card">
<h2 id="pricesTitle"></h2>
<p id="pricesText"></p>
</div>

<div class="card">
<h2 id="bookingTitle"></h2>
<label id="checkinLabel"></label>
<input type="date" id="checkin" class="input-field">

<label id="nightsLabel"></label>
<input type="number" id="nights" min="1" value="1" class="input-field">

<p id="priceResult" style="font-weight:600;margin-top:10px;"></p>
<p id="depositResult" style="font-weight:600;"></p>

<button id="payBtn"></button>
</div>

<!-- НАСТАНЯВАНЕ -->
<div class="card">
<h2 id="accommodationTitle"></h2>
<p id="checkinTime"></p>
<p id="checkoutTime"></p>
</div>

<!-- ПЛАЩАНЕ -->
<div class="card">
<h2 id="paymentTitle"></h2>
<p id="paymentText"></p>
<button onclick="showBank()" id="bankBtn"></button>
<button onclick="showRevolut()" id="revolutBtn"></button>
<div id="paymentInfo" style="margin-top:15px;font-weight:600;"></div>
</div>

<div class="card">
<h2 id="contactTitle"></h2>
<p id="contactText"></p>
<p>🌐 <a href="https://www.facebook.com/share/17wdG6LS9p/?mibextid=wwXIfr" target="_blank">Фейсбук страница</a></p>
</div>

<div class="card">
<h2 id="mapTitle"></h2>
<div class="map-container">
<iframe src="https://www.google.com/maps?q=40.8517289,24.3140363&z=16&output=embed"
width="100%" height="100%" style="border:0;" allowfullscreen></iframe>
</div>
</div>

</div>

<script>
const t={
bg:{
subtitle:"Луксозен апартамент в Неа Перамос • 2 км от яхтеното пристанище на Ираклица",
aboutTitle:"ЗА АПАРТАМЕНТА",
about:`Потопете се в свят на спокойствие и изискан морски комфорт.

Aqua Marine KA5 е идеален за семейство от 4 човека, с двор 20 м² за малки деца. Има собствено парко място.

Разположен на около 2 км от яхтеното пристанище на Ираклица и близо до емблематичните плажове Амолофи и Тюркоазените води. Стилен интериор, простор и внимание към всеки детайл. Тераса с барбекю, светлина, стил и усещане за премиум почивка край морето.`,
pricesTitle:"ЦЕНИ",
prices:`Под 5 нощувки: 160€/вечер<br>5 или повече нощувки: 150€/вечер`,
bookingTitle:"РЕЗЕРВАЦИЯ",
checkin:"Дата на настаняване:",
nights:"Брой нощувки:",
priceLabel:"Обща цена за престой:",
depositLabel:"Общ депозит (20%):",
payBtn:"ПЛАТИ ДЕПОЗИТ",
galleryTitle:"ГАЛЕРИЯ",
contactTitle:"КОНТАКТИ",
contactText:`📧 Имейл: antoaneta_n_k@yahoo.dk<br>📞 Телефон: 00359876644933`,
mapTitle:"ЛОКАЦИЯ",
accommodationTitle:"НАСТАНЯВАНЕ",
checkinTime:"Настаняване: 14:00",
checkoutTime:"Напускане: 10:00",
paymentTitle:"ПЛАЩАНЕ",
paymentText:"Изберете начин на плащане:",
bankBtn:"Банкова сметка",
revolutBtn:"Revolut"
},
en:{
subtitle:"Luxury apartment in Nea Peramos • 2 km from Iraklitsa Marina",
aboutTitle:"ABOUT THE APARTMENT",
about:`Step into a world of calm, elegance and seaside comfort.

Aqua Marine KA5 is perfect for a family of 4, with a 20 m² yard for small children. Includes private parking space.

Located about 2 km from Iraklitsa Marina and close to the iconic beaches Amolofi and Turquoise waters. Stylish interior, space and attention to every detail. BBQ terrace, light, style and premium seaside holiday feeling.`,
pricesTitle:"PRICES",
prices:`Less than 5 nights: 160€/night<br>5+ nights: 150€/night`,

checkinTime:"Check-in: 14:00",

paymentTitle:"PAYMENT",
paymentText:"Choose payment method:",
bankBtn:"Bank Account",
revolutBtn:"Revolut"
}
};

let currentLang='bg';

function setLang(lang){
 currentLang=lang;
 document.getElementById('subtitle').innerHTML=t[lang].subtitle;
 document.getElementById('aboutTitle').innerHTML=t[lang].aboutTitle;
 document.getElementById('aboutText').innerHTML=t[lang].about;
 document.getElementById('pricesTitle').innerHTML=t[lang].pricesTitle;
 document.getElementById('pricesText').innerHTML=t[lang].prices;
 document.getElementById('checkinLabel').innerHTML=t[lang].checkin;
 document.getElementById('nightsLabel').innerHTML=t[lang].nights;
 document.getElementById('bookingTitle').innerHTML=t[lang].bookingTitle;
 document.getElementById('payBtn').innerHTML=t[lang].payBtn;
 document.getElementById('galleryTitle').innerHTML=t[lang].galleryTitle;
 document.getElementById('contactTitle').innerHTML=t[lang].contactTitle;
 document.getElementById('contactText').innerHTML=t[lang].contactText;
 document.getElementById('mapTitle').innerHTML=t[lang].mapTitle;

 // Нови секции
 document.getElementById('accommodationTitle').innerHTML = t[lang].accommodationTitle;
 document.getElementById('checkinTime').innerHTML = t[lang].checkinTime;
 document.getElementById('checkoutTime').innerHTML = t[lang].checkoutTime;
 document.getElementById('paymentTitle').innerHTML = t[lang].paymentTitle;
 document.getElementById('paymentText').innerHTML = t[lang].paymentText;
 document.getElementById('bankBtn').innerHTML = t[lang].bankBtn;
 document.getElementById('revolutBtn').innerHTML = t[lang].revolutBtn;

 updatePrice();
}

setLang('bg');

function updatePrice(){
 const nights=parseInt(document.getElementById('nights').value)||0;
 const pricePerNight=nights>=5?150:160;
 const total=nights*pricePerNight;
 const deposit=total*0.2;

 document.getElementById('priceResult').innerHTML=
   t[currentLang].priceLabel+" "+total+"€";
 document.getElementById('depositResult').innerHTML=
   t[currentLang].depositLabel+" "+deposit.toFixed(2)+"€";
}

document.getElementById('nights').addEventListener('input',updatePrice);
updatePrice();

// Gallery
const gallery=document.getElementById('gallery');
for(let i=1;i<=19;i++){
 const img=document.createElement('img');
 img.src='img'+i+'.jpg';
 img.dataset.index=i-1;
 gallery.appendChild(img);
}

let images=document.querySelectorAll('#gallery img');
let currentIndex=0;

images.forEach(img=>{
 img.onclick=()=>{
  currentIndex=parseInt(img.dataset.index);
  document.getElementById('lightbox').style.display='flex';
  document.getElementById('lightbox-img').src=img.src;
 };
});

function closeLightbox(){document.getElementById('lightbox').style.display='none';}
function prevImage(){currentIndex=(currentIndex-1+images.length)%images.length;document.getElementById('lightbox-img').src=images[currentIndex].src;}
function nextImage(){currentIndex=(currentIndex+1)%images.length;document.getElementById('lightbox-img').src=images[currentIndex].src;}

function revealOnScroll(){
 const cards=document.querySelectorAll('.card');
 const triggerBottom=window.innerHeight*0.85;
 cards.forEach(card=>{
   const top=card.getBoundingClientRect().top;
   if(top<triggerBottom) card.classList.add('visible');
 });
}
window.addEventListener('scroll',revealOnScroll);
window.addEventListener('load',revealOnScroll);

// Payment functions
function showBank(){
 document.getElementById('paymentInfo').innerHTML=
 'Банкова сметка: <br>IBAN: BG02UNCR70001522527069<br>Име: Антоанета Кънева';
}

function showRevolut(){
 document.getElementById('paymentInfo').innerHTML=
 'Revolut: @antoan2vle';
}
</script>

</body>
</html>
