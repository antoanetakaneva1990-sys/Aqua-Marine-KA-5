<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Apartment Nea Peramos</title>

<link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#ECECE6; /* RAL 9002 */
    font-family:'Marck Script', cursive;
    font-size:18px;
    color:#222;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    font-family:'Playfair Display', serif;
    font-size:40px;
    margin-top:30px;
}

.section-title{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:26px;
    color:#000;
    text-transform:uppercase;
    margin-top:40px;
}

.lang{
    text-align:center;
    margin:20px 0;
}

.lang button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#1f2a44;
    color:#fff;
    cursor:pointer;
}

.gallery{
    position:relative;
}

.gallery img{
    width:100%;
    border-radius:14px;
    display:none;
}

.gallery img.active{
    display:block;
}

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.45);
    color:#fff;
    font-size:30px;
    padding:6px 14px;
    border-radius:50%;
    cursor:pointer;
    user-select:none;
}

.left{ left:10px; }
.right{ right:10px; }

.box{
    background:#fff;
    padding:22px;
    border-radius:14px;
    margin-top:20px;
}

button.pay{
    background:#c6a46c;
    color:#fff;
    font-size:18px;
    padding:14px 26px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.map{
    width:100%;
    height:400px;
    border:0;
    border-radius:14px;
}
</style>
</head>

<body>

<div class="container">

<h1 data-bg="ЛУКСОЗЕН АПАРТАМЕНТ – НЕА ПЕРАМОС"
    data-en="LUXURY APARTMENT – NEA PERAMOS">
ЛУКСОЗЕН АПАРТАМЕНТ – НЕА ПЕРАМОС
</h1>

<div class="lang">
<button onclick="setLang('bg')">Български</button>
<button onclick="setLang('en')">English</button>
</div>

<!-- ГАЛЕРИЯ -->

<div class="gallery">
<div class="arrow left" onclick="prevImg()">❮</div>
<div class="arrow right" onclick="nextImg()">❯</div>

<img src="644AE9AE-8FED-4B40-A01E-920C312CFDD4.jpeg" class="active">
<img src="85E38FA5-BB99-4CB0-8DF5-F9524C0476E3.jpeg">
</div>

<!-- ОПИСАНИЕ -->

<div class="section-title"
data-bg="ЗА АПАРТАМЕНТА"
data-en="ABOUT THE APARTMENT">
ЗА АПАРТАМЕНТА
</div>

<div class="box"
data-bg="Потопете се в комфорт, стил и спокойствие. Апартаментът разполага със собствено паркомясто, просторни помещения и всичко необходимо за една безупречна почивка. Локацията е стратегическа — на около 2 км от яхтеното пристанище на Ираклица (около минута и половина с автомобил) и с бърз достъп до тюркоазените води на емблематичните плажове Амолофи."
data-en="Immerse yourself in comfort, style and tranquility. The apartment offers private parking, spacious rooms and everything needed for a flawless holiday. The location is strategic — about 2 km from the Iraklitsa marina (around 1.5 minutes by car) with quick access to the turquoise waters of the iconic Ammolofi beaches.">
Потопете се в комфорт, стил и спокойствие...
</div>

<!-- ЦЕНИ -->

<div class="section-title"
data-bg="ЦЕНИ"
data-en="PRICES">
ЦЕНИ
</div>

<div class="box">
<div data-bg="Под 5 нощувки: 160€ / нощ"
     data-en="Less than 5 nights: 160€ / night"></div>
<div data-bg="5+ нощувки: 150€ / нощ"
     data-en="5+ nights: 150€ / night"></div>
</div>

<!-- РЕЗЕРВАЦИЯ -->

<div class="section-title"
data-bg="РЕЗЕРВАЦИЯ"
data-en="BOOKING">
РЕЗЕРВАЦИЯ
</div>

<div class="box">
<label data-bg="От:" data-en="From:"></label>
<input type="date" id="dateFrom">

<label data-bg="Нощувки:" data-en="Nights:"></label>
<input type="number" id="nights" min="1" value="1">

<button onclick="calcPrice()">OK</button>
<p id="result"></p>
</div>

<!-- КАРТА -->

<iframe class="map"
src="https://maps.google.com/maps?q=40.8517289,24.3140363&z=15&output=embed">
</iframe>

<!-- КОНТАКТИ -->

<div class="section-title"
data-bg="КОНТАКТИ"
data-en="CONTACTS">
КОНТАКТИ
</div>

<div class="box">
📞 +359 XXX XXX XXX<br>
📧 your@email.com<br>
<a href="#">Facebook</a>
</div>

<!-- ПЛАЩАНЕ -->

<div style="text-align:center;margin:40px 0;">
<button class="pay"
onclick="window.location.href='https://buy.stripe.com/test_00g8wQ3Xw5vQ9AkdQQ'">
<span data-bg="ПЛАТИ ДЕПОЗИТ 20%"
      data-en="PAY 20% DEPOSIT"></span>
</button>
</div>

</div>

<script>
let current=0;
const imgs=document.querySelectorAll('.gallery img');

function showImg(i){
    imgs.forEach(x=>x.classList.remove('active'));
    imgs[i].classList.add('active');
}

function nextImg(){
    current=(current+1)%imgs.length;
    showImg(current);
}

function prevImg(){
    current=(current-1+imgs.length)%imgs.length;
    showImg(current);
}

function setLang(lang){
    document.querySelectorAll('[data-bg]').forEach(el=>{
        el.innerText=el.getAttribute('data-'+lang);
    });
}

function calcPrice(){
    const n=Number(document.getElementById('nights').value);
    const price=n>=5?150:160;
    const total=n*price;
    document.getElementById('result').innerText="Общо: "+total+"€";
}
</script>

</body>
</html>
